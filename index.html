<script>


	function createBalloon() {
    	let balloonContainer = document.getElementById("balloon");

    	let newBalloon = document.createElement("img");

    	newBalloon.src = "https://cdn.phototourl.com/free/2026-06-08-bb5033eb-9806-4f88-a397-42fce26667e6.png";

    	newBalloon.style.width = "320px";
    	newBalloon.style.height = "250px";
    
    	newBalloon.style.position = "absolute";
    	newBalloon.style.bottom = "0px"; 
	newBalloon.style.zIndex = "1";

	
    	let containerWidth = balloonContainer.offsetWidth; 
    	let balloonWidth = 320;

        console.log("容器寬度 (containerWidth):", containerWidth);
   	console.log("氣球寬度 (balloonWidth):", balloonWidth);
    
    	let randomLeft = Math.floor(Math.random() * (containerWidth - balloonWidth));
    	console.log("隨機左邊距 (randomLeft):", randomLeft);     
    	
	newBalloon.style.left = randomLeft + "px"; 
 
    	balloonContainer.appendChild(newBalloon);

	newBalloon.addEventListener("click", function() {
        console.log("氣球被點擊了！"); 

	clearInterval(moveInterval);

        balloonContainer.removeChild(newBalloon); 

    	});

	

    	console.log("生成一個氣球！");

	
    	let currentBottom = 0; 
	let moveInterval = setInterval(function() {
       		currentBottom = currentBottom + 1;        
        	newBalloon.style.bottom = currentBottom + "px"; 
      	
           }, 20); 	

	}


	let randomInterval = Math.floor(Math.random() * 2000) + 1000;
	setInterval(createBalloon, randomInterval);
	


</script>
